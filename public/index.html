<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiRD — Kein Label. Kein Stress.</title>
<style>
@font-face {
  font-family: 'StapelExpanded';
  src: url('fonts/StapelExpanded-ExtraBold.otf') format('opentype');
  font-weight: 800;
}
@font-face {
  font-family: 'RocGrotesk';
  src: url('fonts/RocGrotesk-Regular.otf') format('opentype');
  font-weight: 400;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #0000DB;
  --black: #000;
  --white: #fff;
  --grey: #E8E8E8;
  --brown: #60463B;
}

html, body {
  min-height: 100%;
  background: var(--grey);
  color: var(--black);
  font-family: 'RocGrotesk', 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.page { min-height: 100vh; display: flex; flex-direction: column; }

/* ── Nav ── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 40px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
/* =========================================================
   LOGO SIZE — change the height value below to resize logo
   ========================================================= */
nav svg { height: 32px; width: auto; }
nav .nav-right { display: flex; align-items: center; gap: 20px; }
nav .nav-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(0,0,0,0.35); }

/* ── Language toggle ── */
.lang-toggle {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1.5px solid rgba(0,0,0,0.15);
  overflow: hidden;
}
.lang-btn {
  font-family: 'RocGrotesk', Arial, sans-serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: none;
  background: none;
  cursor: pointer;
  color: rgba(0,0,0,0.35);
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.lang-btn.active {
  background: var(--blue);
  color: var(--white);
}
.lang-btn:not(.active):hover { background: rgba(0,0,0,0.05); color: var(--black); }

/* ── Hero ── */
.hero { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 80px 40px 60px; max-width: 860px; }
.eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin-bottom: 24px; }
.headline { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: clamp(44px, 7vw, 88px); line-height: 0.9; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 32px; }
.headline .hl-blue { color: var(--blue); white-space: nowrap; }
.body-text { font-size: 17px; line-height: 1.65; color: rgba(0,0,0,0.55); max-width: 560px; margin-bottom: 48px; }
.body-text strong { color: var(--black); font-weight: 400; }

/* ── CTA button ── */
.cta-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--blue); color: var(--white); font-family: 'RocGrotesk', Arial, sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; border: none; padding: 14px 28px; cursor: pointer; transition: background 0.15s; border-radius: 0; align-self: flex-start; }
.cta-btn:hover { background: #0000AA; }
.cta-btn .arrow { display: inline-block; transition: transform 0.25s; }
.cta-btn.open .arrow { transform: rotate(180deg); }

/* ── Form ── */
.form-wrap { max-height: 0; overflow: hidden; transition: max-height 0.55s cubic-bezier(0.4, 0, 0.2, 1); }
.form-wrap.open { max-height: 900px; }
.form-inner { border-top: 1px solid rgba(0,0,0,0.1); margin-top: 28px; padding-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; max-width: 820px; }
.field { display: flex; flex-direction: column; gap: 7px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(0,0,0,0.45); }
.field .optional { font-size: 10px; letter-spacing: 0.06em; color: rgba(0,0,0,0.25); text-transform: none; margin-left: 4px; }
.field input, .field select { background: var(--white); border: 1.5px solid rgba(0,0,0,0.2); color: var(--black); font-family: 'RocGrotesk', Arial, sans-serif; font-size: 14px; padding: 11px 14px; outline: none; border-radius: 0; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; width: 100%; }
.field input::placeholder { color: rgba(0,0,0,0.25); }
.field input:focus, .field select:focus { border-color: var(--blue); }
.field select { background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='rgba(0,0,0,0.35)' stroke-width='1.5'/%3E%3C/svg%3E"); background-color: var(--white); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; cursor: pointer; }
.field select option { background: #fff; color: #000; }
.form-submit { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-top: 8px; }
.submit-btn { background: var(--blue); color: var(--white); font-family: 'RocGrotesk', Arial, sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; border: none; padding: 13px 28px; cursor: pointer; border-radius: 0; transition: background 0.15s; flex-shrink: 0; }
.submit-btn:hover { background: #0000AA; }
.form-note { font-size: 11px; color: rgba(0,0,0,0.3); line-height: 1.5; }
.success-msg { display: none; padding: 24px 0 0; max-width: 480px; }
.success-msg.visible { display: block; }
.success-headline { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 10px; }
.success-body { font-size: 14px; color: rgba(0,0,0,0.5); line-height: 1.6; }

/* ── Stats strip ── */
.stats { display: flex; border-top: 1px solid rgba(0,0,0,0.08); border-bottom: 1px solid rgba(0,0,0,0.08); margin: 0 40px; }
.stat { flex: 1; padding: 20px 16px; border-right: 1px solid rgba(0,0,0,0.08); }
.stat:last-child { border-right: none; }
.stat-num { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: 28px; text-transform: uppercase; letter-spacing: -0.02em; color: var(--black); line-height: 1; margin-bottom: 4px; }
.stat-num .blue { color: var(--blue); }
.stat-label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(0,0,0,0.35); }

/* ── Features ── */
.features { background: var(--blue); color: var(--white); padding: 80px 40px; }
.features-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 40px; margin-bottom: 64px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 48px; }
.features-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 20px; }
.features-headline { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: clamp(36px, 5vw, 68px); line-height: 0.92; text-transform: uppercase; letter-spacing: -0.02em; flex: 1; max-width: 600px; }
.features-intro { font-size: 15px; line-height: 1.65; color: rgba(255,255,255,0.45); max-width: 340px; flex-shrink: 0; padding-top: 8px; }
.features-intro strong { color: rgba(255,255,255,0.8); font-weight: 400; }
.features-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.1); }
.feature-card { padding: 32px 28px; border-right: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); transition: background 0.2s; }
.feature-card:hover { background: rgba(0,0,0,0.12); }
.feature-num { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); margin-bottom: 24px; display: block; }
.feature-title { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: -0.01em; line-height: 1.15; margin-bottom: 14px; color: var(--white); }
.feature-title .accent { color: rgba(255,255,255,0.5); }
.feature-desc { font-size: 12.5px; line-height: 1.6; color: rgba(255,255,255,0.4); }
.features-footer { margin-top: 56px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.features-tagline { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: clamp(18px, 2.5vw, 28px); text-transform: uppercase; letter-spacing: -0.01em; line-height: 1; }
.features-tagline .hl { color: var(--white); }
.features-tagline span:not(.hl) { color: rgba(255,255,255,0.35); }
.features-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--white); color: var(--blue); font-family: 'RocGrotesk', Arial, sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; border: none; padding: 14px 28px; cursor: pointer; transition: background 0.15s; border-radius: 0; flex-shrink: 0; text-decoration: none; }
.features-cta:hover { background: var(--grey); }

/* ── FAQ ── */
.faq { background: var(--grey); padding: 80px 40px; border-top: 1px solid rgba(0,0,0,0.08); }
.faq-top { margin-bottom: 56px; }
.faq-headline { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: clamp(36px, 5vw, 64px); text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.92; }
.faq-list { border-top: 1px solid rgba(0,0,0,0.1); }
.faq-item { border-bottom: 1px solid rgba(0,0,0,0.1); }
.faq-q { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 24px; background: none; border: none; padding: 28px 0; cursor: pointer; text-align: left; font-family: 'RocGrotesk', Arial, sans-serif; font-size: 16px; color: var(--black); line-height: 1.4; transition: color 0.15s; }
.faq-q:hover { color: var(--blue); }
.faq-q:hover .faq-icon { color: var(--blue); }
.faq-icon { flex-shrink: 0; color: rgba(0,0,0,0.3); transition: transform 0.25s, color 0.15s; }
.faq-item.open .faq-icon { transform: rotate(45deg); color: var(--blue); }
.faq-item.open .faq-q { color: var(--blue); }
.faq-a { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.faq-item.open .faq-a { max-height: 300px; }
.faq-a p { font-size: 14px; line-height: 1.7; color: rgba(0,0,0,0.5); padding-bottom: 28px; max-width: 680px; }

/* ── YSYS ── */
.ysys { padding: 48px 40px; border-top: 1px solid rgba(0,0,0,0.08); background: var(--grey); display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.ysys-tagline { font-family: 'StapelExpanded', 'Arial Black', sans-serif; font-weight: 800; font-size: clamp(18px, 2.5vw, 28px); text-transform: uppercase; letter-spacing: -0.01em; line-height: 1; color: rgba(0,0,0,0.15); }
.ysys-tagline .hl { color: var(--black); }
.ysys-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--grey); color: var(--blue); border: 1.5px solid var(--blue); font-family: 'RocGrotesk', Arial, sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; padding: 13px 28px; cursor: pointer; border-radius: 0; flex-shrink: 0; transition: background 0.15s, color 0.15s; }
.ysys-btn:hover { background: var(--blue); color: var(--white); }

/* ── Footer ── */
footer { padding: 24px 40px; border-top: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.footer-note { font-size: 11px; color: rgba(0,0,0,0.25); letter-spacing: 0.04em; }
.footer-divider { width: 1px; height: 12px; background: rgba(0,0,0,0.1); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .features-grid { grid-template-columns: repeat(2, 1fr); }
  .features-header { flex-direction: column; gap: 24px; }
  .features-intro { max-width: 100%; }
}
@media (max-width: 600px) {
  nav, .hero, footer, .features, .faq, .ysys { padding-left: 20px; padding-right: 20px; }
  .stats { margin: 0 20px; }
  .form-inner { grid-template-columns: 1fr; }
  .field.full { grid-column: 1; }
  .form-submit { flex-direction: column; align-items: flex-start; }
  .stat-num { font-size: 22px; }
  .features-grid { grid-template-columns: 1fr; }
  .features-footer { flex-direction: column; align-items: flex-start; gap: 20px; }
  .ysys { flex-direction: column; align-items: flex-start; gap: 20px; }
  .ysys-tagline { font-size: 16px; }
  .faq-q { font-size: 14px; padding: 22px 0; }
}
</style>
</head>

<div class="page">

  <!-- Nav -->
  <nav>

    <div class="nav-right">
      <span class="nav-label" data-i18n="nav_label"></span>
      <div class="lang-toggle">
        <button class="lang-btn" id="btnDE" onclick="setLang('de')">DE</button>
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1 class="headline">
      <span data-i18n="headline_1"></span><br>
      <span class="hl-blue" data-i18n="headline_2"></span>
    </h1>
    <p class="body-text" data-i18n="body_text"></p>
    <div>
      <button class="cta-btn" id="ctaBtn" onclick="toggleForm()">
        <span data-i18n="cta"></span>
        <svg class="arrow" width="12" height="8" viewBox="0 0 12 8" fill="none">
          <path d="M1 1.5l5 5 5-5" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </button>
      <div class="form-wrap" id="formWrap">
        <form class="form-inner" id="waitlistForm" onsubmit="handleSubmit(event)">
          <div class="field">
            <label data-i18n="f_firstname"></label>
            <input type="text" name="first_name" data-i18n-placeholder="f_firstname_ph" required>
          </div>
          <div class="field">
            <label data-i18n="f_lastname"></label>
            <input type="text" name="last_name" data-i18n-placeholder="f_lastname_ph" required>
          </div>
          <div class="field">
            <label data-i18n="f_email"></label>
            <input type="email" name="email" placeholder="du@example.com" required>
          </div>
          <div class="field">
            <label data-i18n="f_artist"></label>
            <input type="text" name="artist_name" data-i18n-placeholder="f_artist_ph" required>
          </div>
          <div class="field">
            <label data-i18n="f_genre"></label>
            <select name="genre" required>
              <option value="" disabled selected data-i18n="f_genre_ph"></option>
              <option value="hiphop">Hip-Hop / Rap</option>
              <option value="rnb">R&B / Soul</option>
              <option value="electronic">Electronic / Club</option>
              <option value="pop">Pop</option>
              <option value="rock">Rock / Indie</option>
              <option value="jazz">Jazz / Neo-Soul</option>
              <option value="classical" data-i18n="f_genre_classical"></option>
              <option value="folk">Folk / Singer-Songwriter</option>
              <option value="other" data-i18n="f_other"></option>
            </select>
          </div>
          <div class="field">
            <label>
              <span data-i18n="f_label"></span>
              <span class="optional" data-i18n="f_optional"></span>
            </label>
            <input type="text" name="label" data-i18n-placeholder="f_label_ph">
          </div>
          <div class="field">
            <label data-i18n="f_catalog"></label>
            <select name="catalog_size" required>
              <option value="" disabled selected data-i18n="f_catalog_ph"></option>
              <option value="1-5 tracks">1 – 5 Tracks</option>
              <option value="6-20 tracks">6 – 20 Tracks</option>
              <option value="21-50 tracks">21 – 50 Tracks</option>
              <option value="51-100 tracks">51 – 100 Tracks</option>
              <option value="more than 100 tracks" data-i18n="f_catalog_more"></option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="f_gema"></label>
            <select name="gema" required>
              <option value="" disabled selected data-i18n="f_gema_ph"></option>
              <option value="angemeldet" data-i18n="f_gema_yes"></option>
              <option value="nicht angemeldet" data-i18n="f_gema_no"></option>
              <option value="in process" data-i18n="f_gema_pending"></option>
            </select>
          </div>
          <div class="field full">
            <label data-i18n="f_distributor"></label>
            <select name="distributor" required onchange="toggleOtherDistributor(this)">
              <option value="" disabled selected data-i18n="f_distributor_ph"></option>
              <option value="distrokid">DistroKid</option>
              <option value="tune core">TuneCore</option>
              <option value="cdbaby">CD Baby</option>
              <option value="awal">AWAL</option>
              <option value="believe">Believe</option>
              <option value="iMusician">iMusician</option>
              <option value="Amuse">Amuse</option>
              <option value="soundcloud">SoundCloud</option>

// ─────────────────────────────────────────────
// LANGUAGE DETECTION & APPLY
// ─────────────────────────────────────────────
let currentLang = 'de';

function detectLang() {
  const lang = navigator.language || navigator.userLanguage || '';
  return lang.toLowerCase().startsWith('de') ? 'de' : 'en';
}

function applyLang(lang) {
  currentLang = lang;
  const t = i18n[lang];
  document.documentElement.lang = lang;

  // Text nodes
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // Placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  // Active button
  document.getElementById('btnDE').classList.toggle('active', lang === 'de');
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
}

function setLang(lang) {
  applyLang(lang);
  localStorage.setItem('BiRD_lang', lang);
}

// Init: saved preference → browser lang → de
const saved = localStorage.getItem('BiRD_lang');
applyLang(saved || detectLang());

// ─────────────────────────────────────────────
// FORM HELPERS
// ─────────────────────────────────────────────
function toggleOtherDistributor(select) {
  const other = document.getElementById('distributorOther');
  const show = select.value === 'other';
  other.style.display = show ? 'block' : 'none';
  other.required = show;
}

function toggleFaq(btn) {
  const item = btn.closest('.faq-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

function toggleForm() {
  const btn = document.getElementById('ctaBtn');
  const wrap = document.getElementById('formWrap');
  const isOpen = wrap.classList.contains('open');
  wrap.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

// ─────────────────────────────────────────────
// AIRTABLE SUBMIT
// ─────────────────────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();

  // ============================================================
  // WAITLIST SIGNUP — calls our backend, NOT Airtable directly.
  // API token is safe on the server, never exposed to the browser.
  // ============================================================

  const form = document.getElementById('waitlistForm');
  const btn  = form.querySelector('.submit-btn');
  const data = Object.fromEntries(new FormData(form));

  btn.textContent = currentLang === 'de' ? 'Wird gesendet…' : 'Sending…';
  btn.disabled = true;

  const fields = {
    'VORNAME':          data.first_name,
    'NACHNAME':         data.last_name,
    'E-MAIL':           data.email,
    'Artist Name':      data.artist_name,
    'Label':            data.label || '',
    'Catalogue Size':   data.catalog_size,
    'GEMA Status':      data.gema,
    'Distributor':      data.distributor,
    'Other Distributor (if selected)': data.distributor === 'other' ? data.distributor_other : '',
    'Signup Date':      new Date().toISOString().split('T')[0],
  };

  try {
    const res = await fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields, lang: currentLang }),
    });

    if (!res.ok) throw new Error(`Server error ${res.status}`);

    form.style.display = 'none';
    document.getElementById('successMsg').classList.add('visible');

  } catch (err) {
    console.error(err);
    btn.textContent = currentLang === 'de' ? 'Fehler — nochmal versuchen' : 'Error — please try again';
    btn.disabled = false;
    btn.style.background = '#c00';
  }
}
